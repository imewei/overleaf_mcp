# Run `pre-commit install` once to enable hooks.
# Run `pre-commit autoupdate` periodically to bump hook versions.
# Run `pre-commit run --all-files` to check the whole repo.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Mypy runs only on src/ — not tests — to keep hooks fast. Full-repo
  # type checking still happens in CI (.github/workflows/ci.yml).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.0.0

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        files: ^src/
        additional_dependencies: ["bandit[toml]"]
